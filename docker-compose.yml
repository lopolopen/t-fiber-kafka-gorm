services:
  go-app:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: ${ORG_NAME}-${APP_NAME}-debug
    environment:
      - APP_ENV=${APP_ENV}
    ports:
      - 8080:8080
      - 40000:40000
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_PTRACE
    volumes:
      - ./cmd/api/etc:/app/etc
    networks:
      - debug-net

  mariadb:
    image: mariadb:11.8
    container_name: ${ORG_NAME}-${APP_NAME}-debug-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MARIADB_DATABASE: debug
    ports:
      - 3306:3306
    volumes:
      - mysqldata:/var/lib/mysql
    networks:
      - debug-net

  kafka:
    image: apache/kafka:4.1.2
    container_name: ${ORG_NAME}-${APP_NAME}-debug-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
      - kafka-log:/var/log/kafka
    networks:
      debug-net:

  kafka-ui:
    container_name: ${ORG_NAME}-${APP_NAME}-debug-kafka-ui
    image: provectuslabs/kafka-ui:v0.7.2
    ports:
      - 8888:8080
    environment:
      DYNAMIC_CONFIG_ENABLED: "true"
    volumes:
      - kafka-ui-config:/etc/kafkaui
    networks:
      debug-net:

volumes:
  mysqldata:
  kafka-data:
  kafka-log:
  kafka-ui-config:

networks:
  debug-net:
